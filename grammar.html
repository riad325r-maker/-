<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | قواعد اللغة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1000px; margin: 100px auto 2rem; padding: 0 1.5rem; }
        .grammar-list { display: flex; flex-direction: column; gap: 1.5rem; }
        .grammar-card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); cursor: pointer; }
        .grammar-card:hover { border-color: var(--primary); transform: translateX(-5px); }
        .grammar-title { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
        .grammar-desc { color: var(--text-secondary); font-size: 0.95rem; }

        /* Modal for full explanation */
        .grammar-modal { position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; display: none; overflow-y: auto; }
        .grammar-modal.active { display: block; }
        .modal-body { max-width: 800px; margin: 2rem auto; padding: 2rem; background: var(--bg-card); border-radius: 2rem; box-shadow: var(--shadow-lg); }
        .content-area { line-height: 1.8; font-size: 1.05rem; }
        .content-area h3 { color: var(--primary); margin: 1.5rem 0 1rem; }
        .example-box { background: var(--bg-secondary); padding: 1rem; border-radius: 1rem; margin: 1rem 0; border-right: 4px solid var(--secondary); direction: ltr; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="grammarTitle">قواعد اللغة الإنجليزية</h1>
        </div>

        <div class="grammar-list" id="grammarList"></div>
    </div>

    <!-- Modal -->
    <div id="grammarModal" class="grammar-modal">
        <div class="modal-body">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">
                <h2 id="modalTitle"></h2>
                <i class="fas fa-times" style="cursor:pointer; font-size:1.5rem" onclick="closeGrammar()"></i>
            </div>
            <div id="modalContent" class="content-area"></div>
        </div>
    </div>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="grammar-data.js"></script>
    <script src="core.js"></script>
    <script>
        function renderGrammar() {
            const list = document.getElementById('grammarList');
            list.innerHTML = GRAMMAR_DATA.map(g => `
                <div class="grammar-card" onclick="openGrammar(${g.id})">
                    <h3 class="grammar-title">${g.title}</h3>
                    <p class="grammar-desc">${g.sub}</p>
                </div>
            `).join('');
        }

        function openGrammar(id) {
            const g = GRAMMAR_DATA.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = g.title;

            let html = `
                <div class="rule-box">
                    <h3>القاعدة (Rule):</h3>
                    <p>${g.rule}</p>
                </div>
                <div class="formula-box" style="background:#f0f7ff; padding:1rem; border-radius:1rem; margin:1rem 0; font-family:monospace; direction:ltr; text-align:left; border-left:4px solid var(--primary)">
                    ${g.formula}
                </div>
                <h3>أمثلة (Examples):</h3>
                <div class="examples-list">
                    ${g.examples.map(ex => `
                        <div class="example-box">
                            <div style="font-weight:700; color:var(--text-primary)">${ex.en}</div>
                            <div style="color:var(--text-secondary); direction:rtl; text-align:right">${ex.ar}</div>
                        </div>
                    `).join('')}
                </div>
                ${g.tip ? `<div style="margin-top:1.5rem; color:var(--secondary); font-style:italic">💡 ${g.tip}</div>` : ''}
            `;

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('grammarModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGrammar() {
            document.getElementById('grammarModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', renderGrammar);
    </script>
</body>
</html>
