<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الأزمنة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1300px; margin: 100px auto 2rem; padding: 0 1.5rem; }
        .tenses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .tense-card { background: var(--bg-card); border-radius: 1.5rem; overflow: hidden; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); }
        .tense-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .tense-header { padding: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .tense-name { font-size: 1.3rem; font-weight: 800; }
        .tense-body { padding: 1.5rem; }
        .tense-form { background: var(--bg-secondary); padding: 0.8rem; border-radius: 0.8rem; font-family: monospace; margin-bottom: 1rem; border-right: 4px solid var(--primary); direction: ltr; text-align: left; }
        .tense-desc { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.2rem; }
        .read-btn { background: var(--primary); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 2rem; font-weight: 700; cursor: pointer; transition: var(--transition); width: 100%; }

        .tense-modal { position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; display: none; overflow-y: auto; }
        .tense-modal.active { display: block; }
        .modal-container { max-width: 800px; margin: 2rem auto; padding: 1.5rem; background: var(--bg-card); border-radius: 2rem; }
        .example-box { background: var(--bg-secondary); padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; border-right: 4px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="tensesTitle">الأزمنة في الإنجليزية</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-clock"></i> <b id="totalTenses">0</b></div>
            </div>
        </div>

        <div class="tenses-grid" id="tensesGrid"></div>
    </div>

    <!-- Modal -->
    <div id="tenseModal" class="tense-modal">
        <div class="modal-container" id="modalContent"></div>
    </div>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="tenses-data.js"></script>
    <script src="core.js"></script>
    <script>
        function renderTenses() {
            const grid = document.getElementById('tensesGrid');
            grid.innerHTML = TENSES_DATA.map(t => `
                <div class="tense-card">
                    <div class="tense-header">
                        <div class="tense-name">${t.name}</div>
                        <div style="font-size:0.8rem; opacity:0.8">${t.nameAr}</div>
                    </div>
                    <div class="tense-body">
                        <div class="tense-form">${t.form}</div>
                        <p class="tense-desc">${t.explanation.substring(0, 80)}...</p>
                        <button class="read-btn" onclick="openTense(${t.id})" data-i18n="learn">تعلم المزيد</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('totalTenses').textContent = TENSES_DATA.length;
        }

        function openTense(id) {
            const t = TENSES_DATA.find(x => x.id === id);
            const content = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">
                    <h2>${t.name}</h2>
                    <i class="fas fa-times" style="cursor:pointer" onclick="closeTense()"></i>
                </div>
                <div class="tense-form" style="font-size:1.2rem">${t.form}</div>
                <p style="margin-bottom:2rem; line-height:1.8">${t.explanation}</p>
                <h3>أمثلة:</h3>
                ${t.examples.map(ex => `
                    <div class="example-box">
                        <div style="font-weight:700; direction:ltr; text-align:left">${ex.positive}</div>
                        <div style="color:var(--text-secondary); font-size:0.9rem">${ex.positiveAr}</div>
                    </div>
                `).join('')}
            `;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('tenseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeTense() {
            document.getElementById('tenseModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', renderTenses);
    </script>
</body>
</html>
