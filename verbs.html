<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الأفعال وتصاريقها</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1200px; margin: 100px auto 2rem; padding: 0 1.5rem; }
        .verbs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .verb-card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); }
        .verb-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .verb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .verb-infinitive { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .verb-arabic { font-size: 1rem; color: var(--text-secondary); }
        .forms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1rem; }
        .form-item { background: var(--bg-secondary); padding: 0.6rem; border-radius: 0.8rem; text-align: center; }
        .form-label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; margin-bottom: 0.2rem; }
        .form-value { font-weight: 700; color: var(--text-primary); direction: ltr; }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="verbsTitle">الأفعال وتصاريفها</h1>
        </div>

        <div class="search-box" style="margin-bottom: 2rem">
            <i class="fas fa-search"></i>
            <input type="text" id="verbSearch" data-i18n-placeholder="search" placeholder="ابحث عن فعل..." oninput="filterVerbs()">
        </div>

        <div class="verbs-grid" id="verbsGrid"></div>
    </div>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="verbs-data.js"></script>
    <script src="core.js"></script>
    <script>
        function renderVerbs(data = VERBS_DATA) {
            const grid = document.getElementById('verbsGrid');
            grid.innerHTML = data.map(v => `
                <div class="verb-card">
                    <div class="verb-header">
                        <span class="verb-infinitive">${v.v1}</span>
                        <span class="verb-arabic">${v.ar}</span>
                    </div>
                    <div class="forms-grid">
                        <div class="form-item">
                            <div class="form-label">Past Simple (V2)</div>
                            <div class="form-value">${v.v2}</div>
                        </div>
                        <div class="form-item">
                            <div class="form-label">Past Participle (V3)</div>
                            <div class="form-value">${v.v3}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterVerbs() {
            const q = document.getElementById('verbSearch').value.toLowerCase();
            const filtered = VERBS_DATA.filter(v =>
                v.v1.toLowerCase().includes(q) ||
                v.ar.includes(q) ||
                v.v2.toLowerCase().includes(q)
            );
            renderVerbs(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => renderVerbs());
    </script>
</body>
</html>
