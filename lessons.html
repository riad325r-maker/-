<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الكلمات والجمل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1300px; margin: 100px auto 2rem; padding: 0 1.5rem; }
        .words-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        .word-card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); position: relative; overflow: hidden; }
        .word-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .word-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .word-text { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .word-arabic { font-size: 1.1rem; color: var(--text-secondary); background: var(--bg-secondary); padding: 0.3rem 0.8rem; border-radius: 2rem; font-weight: 600; }
        .word-pronunciation { font-size: 0.9rem; color: var(--gray); margin-bottom: 1rem; }
        .word-example { background: var(--bg-secondary); padding: 1rem; border-radius: 1rem; margin-bottom: 1.2rem; border-right: 4px solid var(--primary); }
        .example-en { font-weight: 600; color: var(--text-primary); margin-bottom: 0.4rem; }
        .example-ar { font-size: 0.9rem; color: var(--text-secondary); }
        .word-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .action-btn { padding: 0.7rem; border: none; border-radius: 0.8rem; background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; transition: var(--transition); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.85rem; }
        .action-btn:hover { background: var(--primary); color: white; }
        .action-btn.saved { background: var(--success); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="lessonsTitle">الكلمات والجمل</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-book"></i> <b id="totalWords">0</b></div>
                <div class="quick-stat"><i class="fas fa-bookmark"></i> <b id="savedCount">0</b></div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="level">المستوى:</span>
                    <div class="filter-tabs" id="levelFilters">
                        <button class="filter-tab active" onclick="filterByLevel('all')" data-i18n="all">الكل</button>
                        <button class="filter-tab" onclick="filterByLevel('beginner')" data-i18n="beginner">مبتدئ</button>
                        <button class="filter-tab" onclick="filterByLevel('intermediate')" data-i18n="intermediate">متوسط</button>
                        <button class="filter-tab" onclick="filterByLevel('advanced')" data-i18n="advanced">متقدم</button>
                    </div>
                </div>
                <button class="saved-btn" onclick="toggleSavedView()" id="savedBtn">
                    <i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظة</span>
                </button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="ابحث عن كلمة..." oninput="handleSearch()">
            </div>
        </div>

        <div class="words-grid" id="wordsGrid"></div>

        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage(-1)" id="prevBtn"><i class="fas fa-chevron-right"></i></button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage(1)" id="nextBtn"><i class="fas fa-chevron-left"></i></button>
            </div>
        </div>
    </div>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="beginner-data.js"></script>
    <script src="intermediate-data.js"></script>
    <script src="advanced-data.js"></script>
    <script src="core.js"></script>
    <script>
        let allWords = [...(typeof BEGINNER_WORDS !== 'undefined' ? BEGINNER_WORDS : []),
                        ...(typeof INTERMEDIATE_WORDS !== 'undefined' ? INTERMEDIATE_WORDS : []),
                        ...(typeof ADVANCED_WORDS !== 'undefined' ? ADVANCED_WORDS : [])];
        let filteredWords = allWords;
        let savedIds = JSON.parse(localStorage.getItem('savedWords') || '[]');
        let currentPage = 1;
        const perPage = 24;
        let viewingSaved = false;

        function renderWords() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageWords = filteredWords.slice(start, end);
            const grid = document.getElementById('wordsGrid');

            grid.innerHTML = pageWords.map(w => `
                <div class="word-card">
                    <div class="word-header">
                        <span class="word-text">${w.word}</span>
                        <span class="word-arabic">${w.arabic}</span>
                    </div>
                    <div class="word-pronunciation">${w.pronunciation}</div>
                    <div class="word-example">
                        <div class="example-en">"${w.example}"</div>
                        <div class="example-ar">${w.exampleArabic}</div>
                    </div>
                    <div class="word-actions">
                        <button class="action-btn" onclick="speak('${w.word.replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i></button>
                        <button class="action-btn ${savedIds.includes(w.id)?'saved':''}" onclick="toggleSave(${w.id})">
                            <i class="fas fa-bookmark"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            updatePagination();
            document.getElementById('totalWords').textContent = filteredWords.length;
            document.getElementById('savedCount').textContent = savedIds.length;
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredWords.length / perPage);
            const container = document.getElementById('pageNumbers');
            container.innerHTML = '';
            for(let i=1; i<=totalPages; i++) {
                if(totalPages > 10 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== totalPages) continue;
                const btn = document.createElement('button');
                btn.className = `page-number ${i===currentPage?'active':''}`;
                btn.textContent = i;
                btn.onclick = () => { currentPage = i; renderWords(); window.scrollTo(0,0); };
                container.appendChild(btn);
            }
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;
        }

        function changePage(delta) {
            currentPage += delta;
            renderWords();
            window.scrollTo(0,0);
        }

        function filterByLevel(lvl) {
            viewingSaved = false;
            document.getElementById('savedBtn').classList.remove('active-saved');
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(lvl)));

            if(lvl === 'all') filteredWords = allWords;
            else if(lvl === 'beginner') filteredWords = typeof BEGINNER_WORDS !== 'undefined' ? BEGINNER_WORDS : [];
            else if(lvl === 'intermediate') filteredWords = typeof INTERMEDIATE_WORDS !== 'undefined' ? INTERMEDIATE_WORDS : [];
            else if(lvl === 'advanced') filteredWords = typeof ADVANCED_WORDS !== 'undefined' ? ADVANCED_WORDS : [];

            currentPage = 1;
            renderWords();
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredWords = allWords.filter(w => w.word.toLowerCase().includes(q) || w.arabic.includes(q));
            currentPage = 1;
            renderWords();
        }

        function toggleSave(id) {
            if(savedIds.includes(id)) savedIds = savedIds.filter(i => i !== id);
            else savedIds.push(id);
            localStorage.setItem('savedWords', JSON.stringify(savedIds));
            if(viewingSaved) {
                filteredWords = allWords.filter(w => savedIds.includes(w.id));
            }
            renderWords();
        }

        function toggleSavedView() {
            viewingSaved = !viewingSaved;
            const btn = document.getElementById('savedBtn');
            btn.classList.toggle('active-saved', viewingSaved);
            if(viewingSaved) filteredWords = allWords.filter(w => savedIds.includes(w.id));
            else filteredWords = allWords;
            currentPage = 1;
            renderWords();
        }

        function speak(txt) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        document.addEventListener('DOMContentLoaded', renderWords);
    </script>
</body>
</html>
