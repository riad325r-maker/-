<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | قصص قصيرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1300px; margin: 100px auto 2rem; padding: 0 1.5rem; }
        .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .story-card { background: var(--bg-card); border-radius: 1.5rem; overflow: hidden; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); }
        .story-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .story-img { width: 100%; height: 180px; object-fit: cover; }
        .story-body { padding: 1.5rem; }
        .story-title { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
        .story-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .story-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .read-btn { background: var(--primary); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; font-weight: 700; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .read-btn:hover { background: var(--primary-dark); }

        /* Modal */
        .story-modal { position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; display: none; overflow-y: auto; }
        .story-modal.active { display: block; }
        .modal-container { max-width: 800px; margin: 2rem auto; padding: 1.5rem; background: var(--bg-card); border-radius: 2rem; box-shadow: var(--shadow-lg); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .close-modal { font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        .story-content { font-size: 1.1rem; line-height: 1.8; margin-bottom: 2rem; direction: ltr; text-align: left; white-space: pre-line; }
        .story-translation { background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; margin-top: 2rem; display: none; }
        .story-translation.show { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="storiesTitle">القصص القصيرة</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-book-open"></i> <b id="totalStories">0</b></div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="level">المستوى:</span>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterLevel('all')" data-i18n="all">الكل</button>
                        <button class="filter-tab" onclick="filterLevel('a1')">A1</button>
                        <button class="filter-tab" onclick="filterLevel('b1')">B1</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="stories-grid" id="storiesGrid"></div>
    </div>

    <!-- Modal -->
    <div id="storyModal" class="story-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <span class="close-modal" onclick="closeStory()"><i class="fas fa-times"></i></span>
            </div>
            <div id="modalContent" class="story-content"></div>
            <button class="read-btn" onclick="toggleTranslation()" data-i18n="showTranslation">إظهار الترجمة</button>
            <div id="modalTranslation" class="story-translation"></div>
        </div>
    </div>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="stories-data.js"></script>
    <script src="core.js"></script>
    <script>
        let filteredStories = STORIES_DATA;

        function renderStories() {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = filteredStories.map(s => `
                <div class="story-card">
                    <img src="${s.image}" class="story-img" alt="${s.title}">
                    <div class="story-body">
                        <h3 class="story-title">${s.title}</h3>
                        <p class="story-desc">${s.content.substring(0, 100)}...</p>
                        <div class="story-footer">
                            <span>${s.difficulty || s.level}</span>
                            <button class="read-btn" onclick="openStory(${s.id})" data-i18n="read">اقرأ</button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('totalStories').textContent = filteredStories.length;
        }

        function filterLevel(lvl) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(lvl)));
            filteredStories = lvl === 'all' ? STORIES_DATA : STORIES_DATA.filter(s => s.level === lvl);
            renderStories();
        }

        function openStory(id) {
            const story = STORIES_DATA.find(s => s.id === id);
            document.getElementById('modalTitle').textContent = story.title;
            document.getElementById('modalContent').textContent = story.content;
            document.getElementById('modalTranslation').textContent = story.arabic;
            document.getElementById('storyModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeStory() {
            document.getElementById('storyModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('modalTranslation').classList.remove('show');
        }

        function toggleTranslation() {
            document.getElementById('modalTranslation').classList.toggle('show');
        }

        document.addEventListener('DOMContentLoaded', renderStories);
    </script>
</body>
</html>
